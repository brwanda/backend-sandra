services:
  - type: web
    name: earaconnect-backend
    runtime: java
    buildCommand: chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -jar target/earaconnect-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/auth/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: earaconnect@skybridgecareers.orgs
      - key: FRONTEND_URL
        value: https://earaconnect.vercel.app
      - key: ADMIN_EMAIL
        value: admin@earaconnect.com
      - key: ADMIN_PASSWORD
        value: admin123
