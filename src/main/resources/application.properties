spring.application.name=earaconnect
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/eara_connect_db-final-EARA10
spring.datasource.username=postgres
spring.datasource.password=123

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=trace

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB

# Tomcat file upload limits (must match or exceed Spring limits)
server.tomcat.max-swallow-size=100MB
server.tomcat.max-http-form-post-size=100MB

# Custom file upload directory
app.file.upload-dir=uploads

spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false

# Enhanced Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=uwizeyengogasandra@gmail.com
spring.mail.password= liuanlyleqlizuua
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000


# For debugging (disable in production)
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG
logging.level.javax.mail=DEBUG

# Admin Default Credentials
admin.default.email=admin@earaconnect.com
admin.default.password=admin123

# Session Cookie Configuration
# SameSite=lax: allows cookie to be sent on same-site + top-level cross-site navigations.
# Required for React (port 3000) → Spring Boot (port 8081) credentialed fetch requests.
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/
# 1-hour session timeout (default is 30 minutes)
server.servlet.session.timeout=3600
