spring.application.name=earaconnect
server.port=${PORT:8080}
server.address=0.0.0.0

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres.railway.internal:5432/railway}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB
server.tomcat.max-swallow-size=100MB
server.tomcat.max-http-form-post-size=100MB
app.file.upload-dir=${UPLOAD_DIR:uploads}

spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false

# Resend API (uses HTTPS port 443 - works on Railway free tier)
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL:billing@elohim-hub.com}

# Frontend URL
app.frontend.url=${FRONTEND_URL:https://earaconnect.vercel.app}

# Admin Default Credentials
admin.default.email=${ADMIN_EMAIL:admin@earaconnect.com}
admin.default.password=${ADMIN_PASSWORD:admin123}

# Session Cookie
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/
server.servlet.session.timeout=3600