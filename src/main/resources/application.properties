spring.application.name=earaconnect
server.port=${PORT:8080}
server.address=0.0.0.0

# Database - Railway injects SPRING_DATASOURCE_URL, PGUSER, PGPASSWORD automatically
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres.railway.internal:5432/railway}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:ULYdTAOfswiXngTPBcwTyzXYJumPfiIb}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2KB

# Tomcat file upload limits
server.tomcat.max-swallow-size=100MB
server.tomcat.max-http-form-post-size=100MB

# Custom file upload directory
app.file.upload-dir=${UPLOAD_DIR:uploads}

spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false

# Email Configuration
spring.mail.host='smtp.gmail.com'
spring.mail.port='587'
spring.mail.username='uwizeyengogasandra@gmail.com'
spring.mail.password='liuanlyleqlizuua'
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Admin Default Credentials
admin.default.email=${ADMIN_EMAIL:admin@earaconnect.com}
admin.default.password=${ADMIN_PASSWORD:admin123}

# Session Cookie Configuration
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/
server.servlet.session.timeout=3600